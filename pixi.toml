[workspace]
name = "reactive-wire"
version = "0.2.1"
description = "Node-based reactive automation system for Home Assistant"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "linux-aarch64"]

[dependencies]
nodejs = ">=21,<23"
playwright = "1.55.1.*"

[feature.runtime.dependencies]
nodejs = ">=21,<23"

# ── Core (engine + server) ───────────────────────────────────────────────────
[tasks]
test = "npm run test"
typecheck = "npm run typecheck"
dev = "npm run dev"
start = "npm start"
e2e = "npm run e2e"

# Installs are cached: they only re-run when the manifest or lockfile changes.
[tasks.install]
cmd = "npm install"
inputs = ["package.json", "package-lock.json"]
outputs = ["node_modules/.package-lock.json"]

# Browser binaries for Playwright e2e tests. The Playwright CLI itself comes from the
# conda-forge playwright package above; the CI variant also installs Linux system libraries.
[tasks.playwright-install]
cmd = "playwright install chromium"
depends-on = ["install"]

[tasks.playwright-install-ci]
cmd = "playwright install --with-deps chromium"
depends-on = ["install"]

# ── Editor frontend (runs in ./frontend with the same Node toolchain) ─────────
[tasks.fe-install]
cmd = "npm install"
cwd = "frontend"
inputs = ["frontend/package.json", "frontend/package-lock.json"]
outputs = ["frontend/node_modules/.package-lock.json"]

[tasks.storybook]
cmd = "npm run storybook"
cwd = "frontend"
depends-on = ["fe-install"]

[tasks.build-storybook]
cmd = "npm run build-storybook"
cwd = "frontend"
depends-on = ["fe-install"]

[tasks.fe-typecheck]
cmd = "npm run typecheck"
cwd = "frontend"

[tasks.fe-dev]
cmd = "npm run dev"
cwd = "frontend"

[tasks.fe-build]
cmd = "npm run build"
cwd = "frontend"
depends-on = ["fe-install"]

[tasks.addon-build]
cmd = "npm run addon:build"
depends-on = ["install", "fe-install"]

# ── Aggregates ────────────────────────────────────────────────────────────────
[tasks.install-all]
depends-on = ["install", "fe-install"]

[tasks.check]
depends-on = ["typecheck", "test", "fe-typecheck"]

[environments]
runtime = { features = ["runtime"], no-default-feature = true }
