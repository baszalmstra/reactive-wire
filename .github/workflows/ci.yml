name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck and unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.71.0
          cache: true
          locked: true

      - name: Install npm dependencies through pixi tasks
        run: pixi run install-all

      - name: Run typechecks, lint, and unit tests
        run: pixi run check

  addon-context:
    name: Add-on build context
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.71.0
          cache: true
          locked: true

      - name: Build generated add-on context
        run: pixi run --locked addon-build

      - name: Validate runtime npm lock
        working-directory: reactive_wire/app
        run: pixi run --locked -e runtime npm ci --omit=dev --ignore-scripts --no-audit --no-fund --dry-run
